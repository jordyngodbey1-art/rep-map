<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARNAK | Territory Locator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --karnak-red: #ce2029;
            --karnak-light-red: #fff1f1;
            --dark-border: #111111;
        }

        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; }
        
        /* Header Bar */
        #header {
            background: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 4px solid var(--karnak-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1000;
        }

        #header h1 { margin: 0; font-size: 1.2rem; color: var(--karnak-red); text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        #badge { background: var(--karnak-red); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        /* Map Area */
        #map { height: calc(100vh - 60px); width: 100%; }

        /* Popup Styling */
        .k-popup { min-width: 200px; max-height: 300px; overflow-y: auto; }
        .k-popup h3 { color: var(--karnak-red); border-bottom: 2px solid var(--karnak-red); margin: 0 0 10px 0; font-size: 1.1rem; }
        
        .reg-label {
            font-weight: bold;
            background: var(--karnak-light-red);
            color: var(--karnak-red);
            padding: 3px 6px;
            margin-top: 10px;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 2px;
            border-left: 3px solid var(--karnak-red);
        }

        .rep-names { padding-left: 15px; margin: 5px 0; font-size: 13px; color: #222; list-style-type: square; }
        .rep-names li { margin-bottom: 4px; font-weight: 500; }

        /* Custom Scrollbar */
        .k-popup::-webkit-scrollbar { width: 5px; }
        .k-popup::-webkit-scrollbar-thumb { background: #ce2029; border-radius: 10px; }
    </style>
</head>
<body>

<div id="header">
    <h1>KARNAK <span style="font-weight:300; color:#444;">| TERRITORY LOCATOR</span></h1>
    <div id="badge">LOADING DATA...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([37.8, -96], 4);

    // Clean Map Background
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    async function loadMap() {
        try {
            const [repData, shapeData] = await Promise.all([
                fetch('./reps.json'),
                fetch('./states.json')
            ]);

            const reps = await repData.json();
            const states = await shapeData.json();

            document.getElementById('badge').innerText = reps.length + " ACTIVE REPS";

            const territoryGroups = {};
            reps.forEach(r => {
                if (r.state) {
                    if (!territoryGroups[r.state]) territoryGroups[r.state] = {};
                    const region = r.region || "General";
                    if (!territoryGroups[r.state][region]) territoryGroups[r.state][region] = [];
                    territoryGroups[r.state][region].push(r.name);
                }
            });

            L.geoJson(states, {
                style: function(f) {
                    const active = territoryGroups[f.properties.name];
                    return {
                        fillColor: active ? '#ce2029' : '#e0e0e0', // ACTIVE RED vs INACTIVE GREY
                        weight: 1.5,
                        color: '#111111', // BOLD BLACK BORDERS
                        opacity: 1,
                        fillOpacity: 0.8 // Slightly higher opacity for Red to look richer
                    };
                },
                onEachFeature: function(f, l) {
                    const name = f.properties.name;
                    const regions = territoryGroups[name];

                    let html = `<div class="k-popup"><h3>${name}</h3>`;
                    
                    if (regions) {
                        const order = ["Northern", "Southern", "Eastern", "Western", "Central"];
                        Object.keys(regions).sort((a,b) => {
                            let iA = order.indexOf(a) === -1 ? 99 : order.indexOf(a);
                            let iB = order.indexOf(b) === -1 ? 99 : order.indexOf(b);
                            return iA - iB;
                        }).forEach(reg => {
                            html += `<div class="reg-label">${reg}</div><ul class="rep-names">`;
                            regions[reg].forEach(rep => html += `<li>${rep}</li>`);
                            html += `</ul>`;
                        });
                    } else {
                        html += `<p style="font-size:12px; color:#999;">No assigned representatives.</p>`;
                    }
                    
                    html += `</div>`;
                    l.bindPopup(html);

                    l.on({
                        mouseover: (e) => { e.target.setStyle({ fillOpacity: 0.95, weight: 3, color: '#000' }); },
                        mouseout: (e) => { e.target.setStyle({ fillOpacity: 0.8, weight: 1.5, color: '#111111' }); },
                        click: (e) => { map.fitBounds(e.target.getBounds()); }
                    });
                }
            }).addTo(map);

        } catch (e) {
            console.error(e);
            document.getElementById('badge').innerText = "ERROR";
        }
    }

    loadMap();
</script>

</body>
</html>
