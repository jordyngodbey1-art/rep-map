<!DOCTYPE html>
<html>
<head>
    <title>Karnak Map Debug</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #eee; }
        #status-box { 
            position: absolute; top: 10px; right: 10px; z-index: 9999;
            background: white; padding: 15px; border: 2px solid #004a99;
            border-radius: 8px; max-width: 250px; font-size: 13px;
        }
    </style>
</head>
<body>

<div id="status-box">
    <b>Karnak Map Status:</b><br>
    <span id="load-status">Checking data...</span>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const status = document.getElementById('load-status');
    
    // 1. Initialize Map
    const map = L.map('map').setView([37.8, -96], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Try to load your JSON
    fetch('./reps.json')
        .then(res => {
            if (!res.ok) throw new Error("Could not find reps.json file");
            return res.json();
        })
        .then(data => {
            status.innerHTML = "✅ Found " + data.length + " reps.<br>Map should be visible.";
            
            data.forEach(rep => {
                if (rep.lat && rep.lng) {
                    L.marker([rep.lat, rep.lng])
                     .bindPopup("<b>" + rep.name + "</b><br>" + rep.state)
                     .addTo(map);
                }
            });
        })
        .catch(err => {
            status.style.color = "red";
            status.innerHTML = "❌ Error: " + err.message + 
                               "<br><br>Check if your reps.json has a broken comma or is missing.";
            console.error(err);
        });
</script>

</body>
</html>
