<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARNAK | Sales Rep Locator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --karnak-blue: #004a99;
            --karnak-dark: #333;
            --karnak-light-blue: #4da3ff;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Styling */
        .header {
            background: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .header h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            color: var(--karnak-blue);
            letter-spacing: 1px;
        }

        /* Map Area */
        #map { flex-grow: 1; width: 100%; }

        /* Popup Styling */
        .popup-container { min-width: 180px; }
        .popup-header { 
            border-bottom: 2px solid var(--karnak-blue); 
            margin-bottom: 8px; 
            padding-bottom: 4px;
            font-weight: bold;
            color: var(--karnak-blue);
            font-size: 1.1rem;
        }
        .rep-list { padding: 0; margin: 0; list-style: none; }
        .rep-item { 
            padding: 6px 0; 
            border-bottom: 1px solid #eee; 
            font-size: 0.9rem;
        }
        .rep-item:last-child { border-bottom: none; }

        /* Footer */
        .footer {
            background: var(--karnak-dark);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>KARNAK <span style="font-weight:300; color:#666;">| REP LOCATOR</span></h1>
    <div style="font-size: 0.8rem; color: #666;">Click a state to view representatives</div>
</div>

<div id="map"></div>

<div class="footer">
    &copy; 2026 KARNAK Corporation. All Rights Reserved.
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        attribution: '&copy; OpenStreetMap'
    }).addTo(map);
