<!DOCTYPE html>
<html>
<head>
    <title>Karnak Territory Map | Debugger</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #eee; }
        #debugger { 
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-left: 5px solid #004a99;
            max-width: 400px; font-size: 13px;
        }
        .error { color: #d9534f; font-weight: bold; margin-top: 10px; }
        .success { color: #5cb85c; font-weight: bold; }
    </style>
</head>
<body>

<div id="debugger">
    <b style="color:#004a99; font-size: 1.1em;">Karnak System Diagnostics:</b><hr>
    <div id="step1">1. Checking reps.json... ⏳</div>
    <div id="step2">2. Checking State Shapes... ⏳</div>
    <div id="step3">3. Drawing Territories... ⏳</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([37.8, -96], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function startMap() {
        // --- STEP 1: LOAD REPS ---
        try {
            const res = await fetch('./reps.json');
            if (!res.ok) throw new Error("File 'reps.json' not found on server.");
            const reps = await res.json();
            document.getElementById('step1').innerHTML = "1. reps.json: <span class='success'>VALID ✅ (" + reps.length + " reps found)</span>";
            
            // --- STEP 2: LOAD STATES ---
            try {
                const sRes = await fetch('https://raw.githubusercontent.com/PublicaMundi/MappingPHL/master/data/us_states.json');
                const statesData = await sRes.json();
                document.getElementById('step2').innerHTML = "2. State Shapes: <span class='success'>LOADED ✅</span>";

                // --- STEP 3: COLOR THE MAP ---
                const stateGroups = {};
                reps.forEach(r => { if(r.state) { (stateGroups[r.state] = stateGroups[r.state] || []).push(r.name); } });

                L.geoJson(statesData, {
                    style: (f) => ({
                        fillColor: (stateGroups[f.properties.name] || []).length > 0 ? '#004a99' : '#d1d1d1',
                        weight: 2, color: 'white', fillOpacity: 0.7
                    }),
                    onEachFeature: (f, l) => {
                        const list = stateGroups[f.properties.name] || [];
                        const content = "<b>" + f.properties.name + "</b><hr>" + (list.length > 0 ? "<ul><li>" + list.join("</li><li>") + "</li></ul>" : "No Reps");
                        l.bindPopup(content);
                    }
                }).addTo(map);

                document.getElementById('step3').innerHTML = "3. Status: <span class='success'>MAP READY! 🚀</span>";

            } catch (e) {
                document.getElementById('step2').innerHTML = "2. State Shapes: <span class='error'>FAILED ❌ (Check URL)</span>";
            }

        } catch (e) {
            document.getElementById('step1').innerHTML = "1. reps.json: <span class='error'>BROKEN ❌</span><br><small>" + e.message + "</small>";
            console.error(e);
        }
    }

    startMap();
</script>

</body>
</html>
