<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARNAK | Territory Locator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --karnak-red: #ce2029;
            --karnak-light-red: #fff1f1;
        }

        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; overflow: hidden; }
        
        #header {
            background: white;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 4px solid var(--karnak-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-container img { height: 40px; width: auto; }
        .logo-container h1 { margin: 0; font-size: 1.1rem; color: var(--karnak-red); letter-spacing: 1px; font-weight: bold; }

        #badge { background: var(--karnak-red); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        #map { height: calc(100vh - 65px); width: 100%; background: #e0e0e0; }

        /* State Label Styling */
        .state-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: white !important;
            font-weight: bold !important;
            font-size: 11px !important;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000; /* Makes it visible on red */
            pointer-events: none;
            text-transform: uppercase;
        }

        /* Popup Styling */
        .k-popup { min-width: 210px; max-height: 300px; overflow-y: auto; }
        .k-popup h3 { color: var(--karnak-red); border-bottom: 2px solid var(--karnak-red); margin: 0 0 10px 0; font-size: 1.1rem; }
        
        .reg-label {
            font-weight: bold; background: var(--karnak-light-red); color: var(--karnak-red);
            padding: 4px 6px; margin-top: 10px; font-size: 10px; text-transform: uppercase;
            border-radius: 2px; border-left: 3px solid var(--karnak-red);
        }

        .rep-names { padding-left: 15px; margin: 5px 0; font-size: 13px; color: #222; list-style-type: square; }
        .rep-names li { margin-bottom: 4px; font-weight: 500; }
    </style>
</head>
<body>

<div id="header">
    <div class="logo-container">
        <img src="https://www.karnakcorp.com/wp-content/uploads/2021/04/Karnak-Logo-Red-RGB.png" alt="Karnak Logo">
        <h1>TERRITORY LOCATOR</h1>
    </div>
    <div id="badge">LOADING REPS...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([37.8, -96], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    async function loadKarnakMap() {
        try {
            const [repData, shapeData] = await Promise.all([
                fetch('./reps.json'),
                fetch('./states.json')
            ]);

            const reps = await repData.json();
            const states = await shapeData.json();

            document.getElementById('badge').innerText = reps.length + " ACTIVE REPS";

            const territoryGroups = {};
            reps.forEach(r => {
                if (r.state) {
                    if (!territoryGroups[r.state]) territoryGroups[r.state] = {};
                    const region = r.region || "General";
                    if (!territoryGroups[r.state][region]) territoryGroups[r.state][region] = [];
                    territoryGroups[r.state][region].push(r.name);
                }
            });

            L.geoJson(states, {
                style: (f) => {
                    const active = territoryGroups[f.properties.name];
                    return {
                        fillColor: active ? '#ce2029' : '#d1d1d1',
                        weight: 1.5,
                        color: '#000000', // SHARP BLACK BORDERS
                        opacity: 1,
                        fillOpacity: 0.8
                    };
                },
                onEachFeature: (f, l) => {
                    const name = f.properties.name;
                    const regions = territoryGroups[name];

                    // ADD STATE NAME LABEL
                    l.bindTooltip(name, {
                        permanent: true,
                        direction: 'center',
                        className: 'state-label'
                    }).openTooltip();

                    // BUILD POPUP
                    let html = `<div class="k-popup"><h3>${name}</h3>`;
                    if (regions) {
                        const order = ["Northern", "Southern", "Eastern", "Western", "Central"];
                        Object.keys(regions).sort((a,b) => {
                            let iA = order.indexOf(a) === -1 ? 99 : order.indexOf(a);
                            let iB = order.indexOf(b) === -1 ? 99 : order.indexOf(b);
                            return iA - iB;
                        }).forEach(reg => {
                            html += `<div class="reg-label">${reg}</div><ul class="rep-names">`;
                            regions[reg].forEach(rep => html += `<li>${rep}</li>`);
                            html += `</ul>`;
                        });
                    } else {
                        html += `<p style="font-size:12px; color:#999;">No reps assigned.</p>`;
                    }
                    html += `</div>`;
                    l.bindPopup(html);

                    l.on({
                        mouseover: (e) => { e.target.setStyle({ fillOpacity: 0.95, weight: 3 }); },
                        mouseout: (e) => { e.target.setStyle({ fillOpacity: 0.8, weight: 1.5 }); },
                        click: (e) => { map.fitBounds(e.target.getBounds()); }
                    });
                }
            }).addTo(map);

        } catch (e) {
            console.error(e);
            document.getElementById('badge').innerText = "DATA ERROR";
        }
    }

    loadKarnakMap();
</script>

</body>
</html>
