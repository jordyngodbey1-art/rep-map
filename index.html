<!DOCTYPE html>
<html>
<head>
    <title>KARNAK | Territory Locator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        #header { background: #fff; padding: 12px 20px; border-bottom: 3px solid #004a99; display: flex; align-items: center; justify-content: space-between; }
        #map { height: calc(100vh - 70px); width: 100%; background: #f0f0f0; }
        .info-box { padding: 10px; min-width: 160px; }
        .state-title { font-weight: bold; color: #004a99; border-bottom: 2px solid #004a99; margin-bottom: 8px; }
        .rep-list { margin: 0; padding: 0; list-style: none; font-size: 13px; }
        #debug-bar { background: #333; color: #0f0; padding: 5px 15px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<div id="debug-bar">System Status: <span id="log">Initializing...</span></div>

<div id="header">
    <h1 style="margin:0; font-size:1.3rem; color:#004a99;">KARNAK <span style="font-weight:300; color:#666;">| TERRITORY MAP</span></h1>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const log = document.getElementById('log');
    const map = L.map('map').setView([37.8, -96], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Using a different, highly reliable US States source
    const statesUrl = 'https://raw.githubusercontent.com/PublicaMundi/MappingPHL/master/data/us_states.json';
    const repsUrl = './reps.json';

    async function loadMap() {
        try {
            log.innerText = "Fetching Reps...";
            const repRes = await fetch(repsUrl);
            const reps = await repRes.json();
            
            log.innerText = "Fetching State Shapes...";
            const stateRes = await fetch(statesUrl);
            const statesData = await stateRes.json();

            log.innerText = "Data loaded. Mapping " + reps.length + " reps...";

            // Grouping Logic
            const stateGroups = {};
            reps.forEach(r => {
                const s = r.state;
                if (s) {
                    if (!stateGroups[s]) stateGroups[s] = [];
                    stateGroups[s].push(r.name);
                }
            });

            // Draw States
            L.geoJson(statesData, {
                style: function(feature) {
                    const name = feature.properties.name;
                    const hasReps = stateGroups[name] && stateGroups[name].length > 0;
                    return {
                        fillColor: hasReps ? '#004a99' : '#d1d1d1',
                        weight: 2,
                        opacity: 1,
                        color: 'white',
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function(feature, layer) {
                    const name = feature.properties.name;
                    const list = stateGroups[name] || [];
                    let content = `<div class="info-box"><div class="state-title">${name}</div><ul class="rep-list">`;
                    content += list.length > 0 ? list.map(n => `<li>${n}</li>`).join('') : "<li>No reps assigned.</li>";
                    content += "</ul></div>";
                    
                    layer.bindPopup(content);
                }
            }).addTo(map);

            log.innerText = "Success: Map Shaded.";

        } catch (err) {
            log.style.color = "red";
            log.innerText = "Critical Error: " + err.message;
            console.error(err);
        }
    }

    loadMap();
</script>

</body>
</html>
